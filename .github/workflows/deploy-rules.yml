name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
  workflow_dispatch:

jobs:
  deploy-rules:
    name: Deploy Firestore Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project harvest-agent-233a1
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
