name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

  # Build is intentionally separate and not required to pass yet.
  # `next build` needs ~25 real env vars (Firebase, Stripe, Composio, etc.)
  # that we don't want to fake with dummy values, since a fake Stripe key
  # could mask a real config bug. Vercel already builds on every deploy
  # with real secrets, so this isn't the safety net for build failures —
  # `test` above is. Revisit this job once secrets are wired into
  # GitHub Actions via repo secrets, if build-time regressions become a problem.
  build-check:
    name: Build (informational only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
